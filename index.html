<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Knowledge Base</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text: #1a1a1a;
      --text-secondary: #6b6b68;
      --text-tertiary: #a0a09c;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #2a2a28;
        --text: #f0ede8;
        --text-secondary: #9a9892;
        --text-tertiary: #6a6866;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.2);
      }
      .badge-summary { background: #0c447c !important; color: #b5d4f4 !important; }
      .badge-infographic { background: #3c3489 !important; color: #cecbf6 !important; }
      .badge-mindmap { background: #085041 !important; color: #9fe1cb !important; }
      .badge-notes { background: #633806 !important; color: #fac775 !important; }
      .tag { background: #2a2a28 !important; color: #9a9892 !important; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      padding: 2rem 0 1.5rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .search {
      flex: 1;
      min-width: 160px;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .search:focus { border-color: var(--border-hover); }

    .filter-btn {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { background: var(--bg-secondary); }
    .filter-btn.active {
      background: var(--bg-secondary);
      color: var(--text);
      border-color: var(--border-hover);
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      padding-bottom: 3rem;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover { border-color: var(--border-hover); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-summary    { background: #E6F1FB; color: #0C447C; }
    .badge-infographic{ background: #EEEDFE; color: #3C3489; }
    .badge-mindmap    { background: #E1F5EE; color: #085041; }
    .badge-notes      { background: #FAEEDA; color: #633806; }

    .card-date { font-size: 11px; color: var(--text-tertiary); }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
    .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .card-footer {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 12px;
      background: var(--bg-secondary);
      color: var(--text-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-tertiary);
      font-size: 14px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My knowledge base</h1>
      <p>Summaries, infographics & mindmaps — all in one place</p>
    </div>

    <div class="controls">
      <input class="search" type="text" id="search" placeholder="Search..." oninput="render()" />
      <button class="filter-btn active" data-type="all"         onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-type="summary"     onclick="setFilter('summary')">Summaries</button>
      <button class="filter-btn"        data-type="infographic" onclick="setFilter('infographic')">Infographics</button>
      <button class="filter-btn"        data-type="mindmap"     onclick="setFilter('mindmap')">Mindmaps</button>
      <button class="filter-btn"        data-type="notes"       onclick="setFilter('notes')">Notes</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <script>
    let posts = [];
    let activeFilter = 'all';

    async function loadPosts() {
      const res = await fetch('posts.json');
      posts = await res.json();
      render();
    }

    function setFilter(type) {
      activeFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.type === type)
      );
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = posts.filter(p => {
        const matchType = activeFilter === 'all' || p.type === activeFilter;
        const matchQ = !q ||
          p.title.toLowerCase().includes(q) ||
          p.desc.toLowerCase().includes(q) ||
          (p.tags || []).some(t => t.toLowerCase().includes(q));
        return matchType && matchQ;
      });

      const grid = document.getElementById('grid');

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No posts found.</div>';
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <a class="card" href="posts/${p.file}">
          <div class="card-top">
            <span class="badge badge-${p.type}">${p.type}</span>
            <span class="card-date">${formatDate(p.date)}</span>
          </div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </a>
      `).join('');
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    loadPosts();
  </script>
</body>
</html>
