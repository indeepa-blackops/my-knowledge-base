<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'system';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (savedTheme === 'system' && prefersDark)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Knowledge Base</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>My knowledge base</h1>
        <button id="theme-toggle" class="filter-btn" onclick="toggleTheme()" title="Toggle Day/Night Mode">🌙</button>
      </div>
      <p>Summaries, infographics & mindmaps — all in one place</p>
    </div>

    <div class="controls">
      <input class="search" type="text" id="search" placeholder="Search..." oninput="render()" />
      <select class="date-filter" id="date-filter" onchange="render()">
        <option value="all">All months</option>
      </select>
      <select class="sort-filter" id="sort-filter" onchange="handleSortChange()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
      <button class="filter-btn active" data-type="all"         onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-type="summary"     onclick="setFilter('summary')">Summaries</button>
      <button class="filter-btn"        data-type="infographic" onclick="setFilter('infographic')">Infographics</button>
      <button class="filter-btn"        data-type="mindmap"     onclick="setFilter('mindmap')">Mindmaps</button>
      <button class="filter-btn"        data-type="notes"       onclick="setFilter('notes')">Notes</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Card template for secure, clean rendering -->
  <template id="card-template">
    <a class="card" href="#">
      <div class="card-top">
        <span class="badge"></span>
        <span class="card-date"></span>
      </div>
      <div class="card-title"></div>
      <div class="card-desc"></div>
      <div class="card-footer"></div>
    </a>
  </template>

  <script src="main.js"></script>
</body>
</html>
